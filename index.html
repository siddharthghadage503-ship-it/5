<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sanskruti ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
background:url("https://images.pexels.com/photos/1024960/pexels-photo-1024960.jpeg") no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

/* START SCREEN */

#startScreen{
position:relative;
z-index:5;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;
box-shadow:0 0 30px #ff4d6d;
animation:glow 2s infinite alternate;
}

#openBtn{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:20px;
}

/* INTRO TEXT */

#intro{
display:none;
font-size:32px;
font-weight:bold;
z-index:5;
}

/* MAIN BOX */

.container{
display:none;
background:rgba(0,0,0,0.5);
padding:40px;
border-radius:20px;
max-width:400px;
box-shadow:0 0 30px #ff4d6d;
animation:glow 2s infinite alternate;
z-index:5;
}

@keyframes glow{
from{box-shadow:0 0 20px #ff4d6d;}
to{box-shadow:0 0 50px #ff99aa;}
}

/* PHOTO */

.photo{
width:180px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 20px white;
transform:rotate(90deg);
opacity:0;
animation:fadeInPhoto 3s ease forwards;
}

/* PHOTO ANIMATION */

@keyframes fadeInPhoto{

0%{
opacity:0;
transform:rotate(90deg) scale(0.7);
}

100%{
opacity:1;
transform:rotate(90deg) scale(1);
}

}

/* HEARTS */

.heart{
position:absolute;
color:#ff4d6d;
animation:float 6s linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:1;
}

100%{
transform:translateY(-10vh);
opacity:0;
}

}

/* BUTTONS */

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
}

#yes{
background:#00ff95;
}

#no{
background:#ff4d4d;
position:absolute;
}

</style>
</head>

<body>

<div id="startScreen">
<h1>💖 For Sanskruti 💖</h1>
<p>I made something special for you...</p>
<button id="openBtn">Tap to Open ❤️</button>
</div>

<div id="intro"></div>

<div class="container" id="main">

<img src="photo.jpg" class="photo">

<h1>Sanskruti ❤️</h1>

<p>I promise to love you forever.</p>
<p>You are the most special person in my life.</p>
<p>Every moment with you feels beautiful.</p>
<p>Will you be a part of my life?</p>

<h3>– Siddhesh ❤️</h3>

<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>

</div>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let text="Sanskruti... I want to tell you something from my heart ❤️";
let i=0;

const openBtn=document.getElementById("openBtn");
const startScreen=document.getElementById("startScreen");
const intro=document.getElementById("intro");
const main=document.getElementById("main");
const music=document.getElementById("bgmusic");

openBtn.onclick=function(){

music.play();

startScreen.style.display="none";
intro.style.display="block";

typing();

}

function typing(){

if(i<text.length){

intro.innerHTML+=text.charAt(i);
i++;

setTimeout(typing,80);

}else{

setTimeout(function(){

intro.style.display="none";
main.style.display="block";

},1500);

}

}

/* YES */

document.getElementById("yes").onclick=function(){

document.body.innerHTML="<h1 style='font-size:50px'>💍 Sanskruti ❤️<br>You made Siddhesh the happiest person alive!</h1>";

}

/* NO BUTTON MOVE */

document.getElementById("no").onmouseover=moveButton;
document.getElementById("no").ontouchstart=moveButton;

function moveButton(){

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

let btn=document.getElementById("no");

btn.style.left=x+"px";
btn.style.top=y+"px";

}

/* HEARTS */

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

},300);

</script>

</body>
</html>
